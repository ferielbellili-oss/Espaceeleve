<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EspaceEleve — Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="theme-btn" onclick="toggleTheme()" title="Changer le thème">☀️</div>

    <div class="container">
        <div class="logo-area">
            <div class="logo-ball">🎓</div>
            <h1>Espace<span>Eleve</span></h1>
        </div>

        <div class="role-grid">
            <div class="role-btn active" id="role-professeur" onclick="selectRole('professeur')">
                <div class="ri">👩‍🏫</div><div class="rl">Professeur</div>
            </div>
            <div class="role-btn" id="role-eleve" onclick="selectRole('eleve')">
                <div class="ri">🎒</div><div class="rl">Élève</div>
            </div>
            <div class="role-btn" id="role-directeur" onclick="selectRole('directeur')">
                <div class="ri">🏫</div><div class="rl">Directeur</div>
            </div>
        </div>

        <div class="card">
            <h2 id="formTitle">👩‍🏫 Connexion Professeur</h2>

            <div class="alert alert-err" id="alertErr"></div>
            <div class="alert alert-ok"  id="alertOk"></div>

            <form id="loginForm" onsubmit="doLogin(event)">
                <div class="fg">
                    <label>Nom d'utilisateur</label>
                    <input id="username" type="text" placeholder="ex: saidi.nadia" autocomplete="username">
                    <div class="err-msg" id="usernameErr">Veuillez entrer votre nom d'utilisateur</div>
                </div>
                <div class="fg">
                    <label>Mot de passe</label>
                    <input id="password" type="password" placeholder="••••••••••" autocomplete="current-password">
                    <div class="err-msg" id="passwordErr">Veuillez entrer votre mot de passe</div>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-txt">Se connecter</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>

        <p style="text-align:center;font-size:11.5px;color:var(--text3);margin-top:14px">
            Vos identifiants sont fournis par l'administration du lycée
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
